{% extends 'base.html' %}
{% load static %}
{% block extra_css %}
<style>
  .auth-page { position: relative; width: 100vw; height: 100vh; overflow: hidden; }
  .auth-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; object-position: center; z-index: 0; }
  .auth-card-wrap { position: relative; z-index: 1; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; box-sizing: border-box; }
  .auth-card { width: 100%; max-width: 450px; background: #FFFFFF; border-radius: 8px; box-shadow: 0 4px 24px rgba(0,0,0,0.12); padding: 32px; }
  .auth-tabs { display: flex; width: 100%; border-bottom: 1px solid #E5E7EB; margin-bottom: 24px; }
  .auth-tab { flex: 1; background: none; border: none; padding: 12px; font-size: 16px; cursor: pointer; text-decoration: none; color: #374151; font-weight: normal; text-align: center; border-radius: 4px; }
  .auth-tab:hover { color: #111827; }
  .auth-tab:focus { outline: none; box-shadow: 0 0 0 2px #2563EB; }
  .auth-tab.active { color: #111827; font-weight: 600; }
  .auth-tab.inactive { color: #374151; }
  .auth-form label { display: block; font-size: 14px; font-weight: bold; color: #111827; margin-bottom: 8px; }
  .auth-form .hint { font-size: 12px; color: #6b7280; margin-bottom: 6px; }
  .auth-form input[type="email"],
  .auth-form input[type="password"],
  .auth-form input[type="text"] { width: 100%; padding: 10px 12px; border: 1px solid #D1D5DB; border-radius: 6px; font-size: 14px; box-sizing: border-box; }
  .auth-form input:focus { outline: none; border-color: #2563EB; box-shadow: 0 0 0 2px rgba(37,99,235,0.3); }
  .auth-form .field { margin-bottom: 24px; }
  .auth-form .forgot-wrap { text-align: right; margin-top: 8px; margin-bottom: 24px; }
  .auth-form .forgot { font-size: 13px; color: #1d4ed8; text-decoration: none; }
  .auth-form .forgot:hover { text-decoration: underline; }
  .auth-form .forgot:focus { outline: none; box-shadow: 0 0 0 2px #2563EB; border-radius: 4px; }
  .auth-form .btn-submit { width: 100%; height: 46px; background: #2563EB; color: #FFFFFF; font-weight: 600; font-size: 16px; border: none; border-radius: 6px; cursor: pointer; }
  .auth-form .btn-submit:hover { background: #1d4ed8; }
  .auth-form .btn-submit:focus { outline: none; box-shadow: 0 0 0 2px #2563EB; }
  .auth-form .errorlist { list-style: none; padding: 0; margin: 0 0 12px 0; font-size: 13px; color: #b91c1c; }
  .auth-footer { position: fixed; bottom: 0; left: 0; right: 0; height: 40px; background: #FFFFFF; display: flex; align-items: center; justify-content: center; z-index: 2; font-size: 12px; color: #374151; }
</style>
{% endblock %}
{% block content %}
<div class="auth-page">
  <img class="auth-bg" src="{% static 'guide/images/glasgow-bg.svg' %}" alt="Glasgow University main building under a cloudy sky">
  <div class="auth-card-wrap">
    <div class="auth-card">
      <nav class="auth-tabs" aria-label="Login or Register">
        {% block auth_tabs %}{% endblock %}
      </nav>
      <div class="auth-form">
        {% block card_content %}{% endblock %}
      </div>
    </div>
  </div>
  <footer class="auth-footer">
    <span>© 2026 Glasgow Survival Guide. All rights reserved.</span>
  </footer>
</div>
{% endblock %}
