{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Glasgow Survival Guide{% endblock %}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="{% static 'guide/style.css' %}">
</head>

<body class="d-flex flex-column min-vh-100">

    <div class="page-bg">
        <img src="{% static 'guide/images/glasgow-bg.jpg' %}"
             alt="Glasgow University buildings' picture">
    </div>

    <nav class="navbar bg-white shadow-sm px-3">
        <span class="navbar-brand fw-bold mb-0" >
            Glasgow Survival Guidance
        </span>

        <form class="d-flex" method="get" action="{% url 'guide:post_list' %}">
            <input class="form-control" type="text" name="q"
                   placeholder="Search" >
        </form>

        <div class="d-flex align-items-center gap-3">
            <a href="{% url 'guide:index' %}">Home</a>
            {% if user.is_authenticated %}
                <a href="{% url 'guide:logout' %}">Log out</a>
            {% else %}
                <a href="{% url 'guide:login' %}">log in/sign up</a>
            {% endif %}
        </div>
    </nav>

    <main class="flex-grow-1 d-flex flex-column">
        {% block content %}{% endblock %}
    </main>

    <footer class="bg-white text-center py-2 mt-auto shadow-sm" style="font-size: 12px; color: #6b7280;">
        &copy; 2026 Glasgow Survival Guide. All rights reserved.
        <a href="{% url 'guide:about' %}">About us</a>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
