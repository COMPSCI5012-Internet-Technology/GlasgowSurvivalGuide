<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Glasgow Survival Guide{% endblock %}</title>
  {% block extra_css %}{% endblock %}
</head>
<body>
  <nav aria-label="Main navigation">
    <a href="{% url 'guide:index' %}">Home</a>
    <a href="{% url 'guide:post_list' %}">Posts</a>
    <a href="{% url 'guide:news_list' %}">News</a>
    {% if user.is_authenticated %}
    <a href="{% url 'guide:collection_list' %}">Collections</a>
    {% endif %}
  </nav>
  {% block content %}{% endblock %}
</body>
</html>
